name: Backend CD

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Backend CI"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: backend-cd-main
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      REGISTRY: registry.kube.nikhilbhatia.com
      IMAGE: registry.kube.nikhilbhatia.com/invoicing-api:latest
      NAMESPACE: nikhil
      DEPLOYMENT: invoicing-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Write backend env file
        run: |
          cat > backend/.env.production <<EOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          ALGORITHM=${{ secrets.ALGORITHM }}
          ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
          DEBUG=${{ secrets.DEBUG }}
          ENVIRONMENT=production
          SMTP_ENCRYPTION_KEY=${{ secrets.SMTP_ENCRYPTION_KEY }}
          BACKUP_ENCRYPTION_KEY=${{ secrets.BACKUP_ENCRYPTION_KEY }}
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}

      - name: Cleanup backend env file
        if: always()
        run: rm -f backend/.env.production

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          printf '%s' "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Restart and verify rollout
        run: |
          kubectl rollout restart deployment/${DEPLOYMENT} -n ${NAMESPACE}
          kubectl rollout status deployment/${DEPLOYMENT} -n ${NAMESPACE} --timeout=120s
